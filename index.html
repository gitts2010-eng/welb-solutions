<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WELB Solutions — Microfinance System</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{font-family:Arial;background:#f5f5f2}
.btn{padding:8px 14px;background:#0f6e56;color:#fff;border:none;border-radius:6px;cursor:pointer}
.card{background:#fff;padding:15px;margin:10px;border-radius:10px}
</style>

</head>

<body>

<h2>WELB Microfinance Dashboard</h2>

<div class="card">
  <h3>Profit Dashboard</h3>
  <div id="profit"></div>
</div>

<div class="card">
  <h3>Contributions</h3>
  <table border="1" width="100%">
    <thead><tr><th>Date</th><th>Name</th><th>Amount</th></tr></thead>
    <tbody id="contributions"></tbody>
  </table>
</div>

<div class="card">
  <button class="btn" onclick="sendSMSReminders()">Send SMS Reminders</button>
  <button class="btn" onclick="checkArrears()">Check Arrears</button>
</div>

<script>

// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyCQJSAhF_H7J1rsl6hKMPPgiOA-0QqjaVQ",
  authDomain: "welb-solutions.firebaseapp.com",
  projectId: "welb-solutions"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ================= STATE =================
let S = {
  loans: [],
  payments: [],
  contributions: []
};

// ================= LOAD REALTIME =================
function initRealtime() {

  db.collection("contributions").onSnapshot(snap => {
    S.contributions = snap.docs.map(d => d.data());
    renderContributions();
  });

  db.collection("loans").onSnapshot(snap => {
    S.loans = snap.docs.map(d => d.data());
    calcProfit();
  });

  db.collection("payments").onSnapshot(snap => {
    S.payments = snap.docs.map(d => d.data());
    calcProfit();
  });

}

// ================= RENDER =================
function renderContributions() {
  const tb = document.getElementById("contributions");

  tb.innerHTML = S.contributions.map(c => `
    <tr>
      <td>${c.date}</td>
      <td>${c.founderName}</td>
      <td>${c.amount}</td>
    </tr>
  `).join('');
}

// ================= PROFIT =================
function calcProfit() {

  let disbursed = S.loans.reduce((s,l)=>s+l.amount,0);
  let collected = S.payments.reduce((s,p)=>s+p.amount,0);
  let capital = S.contributions.reduce((s,c)=>s+c.amount,0);

  let profit = collected - disbursed;

  document.getElementById("profit").innerHTML = `
    Capital: KES ${capital}<br>
    Disbursed: KES ${disbursed}<br>
    Collected: KES ${collected}<br>
    <b>Profit: KES ${profit}</b>
  `;
}

// ================= ARREARS =================
function checkArrears() {

  let today = new Date();

  S.loans.forEach(l => {

    let paid = S.payments
      .filter(p=>p.loanId===l.id)
      .reduce((s,p)=>s+p.amount,0);

    if(paid < l.totalPayable) {

      console.log("ARREARS:", l.clientName);

      // optional: save alert
      db.collection("alerts").add({
        loanId: l.id,
        client: l.clientName,
        message: "Loan overdue",
        date: new Date().toISOString()
      });

    }

  });

  alert("Arrears check complete");
}

// ================= SMS =================
function sendSMS(phone, message) {
  console.log("Sending SMS to", phone, message);

  // 🔴 CONNECT YOUR SMS API HERE
  // Example: Africa's Talking / Twilio
}

function sendSMSReminders() {

  S.loans.forEach(l => {

    let paid = S.payments
      .filter(p=>p.loanId===l.id)
      .reduce((s,p)=>s+p.amount,0);

    if(paid < l.totalPayable) {

      let msg = `Dear ${l.clientName}, you have an outstanding loan balance. Please pay promptly.`;

      sendSMS(l.phone, msg);

      db.collection("sms_log").add({
        loanId: l.id,
        phone: l.phone,
        message: msg,
        date: new Date().toISOString()
      });

    }

  });

  alert("SMS reminders sent (simulated)");
}

// ================= INIT =================
initRealtime();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WELB Solutions — Microfinance System</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
  /* [CSS Styles remain the same as your original provided context] */
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --green:#0f6e56;--green-mid:#1d9e75;--green-light:#e1f5ee;
    --bg:#f5f5f2;--surface:#ffffff;--border:#e5e5e0;--border2:#d0d0c8;
    --text:#1a1a18;--text2:#6b6b65;--text3:#9b9b95;
    --danger-bg:#fef2f2;--danger:#c53030;--warn-bg:#fffbeb;--warn:#b45309;
    --info-bg:#eff6ff;--info:#1e40af;--purple-bg:#f5f3ff;--purple:#5b21b6;
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5}
  #app{display:flex;min-height:100vh}
  #sidebar{width:215px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
  #main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:50px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:10}
  .content{flex:1;padding:16px;overflow-y:auto}
  .page{display:none}.page.active{display:block}
  .brand{padding:16px;border-bottom:1px solid var(--border)}
  .brand-row{display:flex;align-items:center;gap:10px}
  .brand-icon{width:38px;height:38px;border-radius:9px;background:var(--green);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;flex-shrink:0;letter-spacing:0.5px}
  .brand-name{font-size:13px;font-weight:700;color:var(--text);line-height:1.2}
  .brand-sub{font-size:10px;color:var(--text2)}
  .user-info{padding:10px 16px;border-bottom:1px solid var(--border)}
  .user-name{font-size:12px;font-weight:600;color:var(--text)}
  .user-online{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--green-mid);margin-top:2px}
  .online-dot{width:6px;height:6px;border-radius:50%;background:var(--green-mid)}
  .nav{flex:1;padding:8px 0}
  .nav-section{font-size:10px;font-weight:600;color:var(--text3);padding:10px 16px 4px;text-transform:uppercase;letter-spacing:0.6px}
  .nav-item{display:flex;align-items:center;gap:9px;padding:8px 16px;font-size:12px;color:var(--text2);cursor:pointer;transition:all 0.1s;border-left:2px solid transparent}
  .nav-item:hover{background:#f9f9f7;color:var(--text)}
  .nav-item.active{background:var(--green-light);color:var(--green);font-weight:600;border-left-color:var(--green)}
  .ni{width:14px;height:14px;flex-shrink:0;opacity:0.8}
  .topbar-title{font-size:14px;font-weight:600;color:var(--text)}
  .topbar-right{display:flex;align-items:center;gap:12px}
  .save-status{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px}
  .save-dot{width:6px;height:6px;border-radius:50%;background:#ccc}
  .save-dot.saved{background:var(--green-mid)}
  .save-dot.saving{background:var(--warn);animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  .avatar{width:30px;height:30px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:700}
  .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
  .stat-label{font-size:11px;color:var(--text2);margin-bottom:3px}
  .stat-value{font-size:20px;font-weight:700;color:var(--text);margin-bottom:2px;line-height:1.2}
  .stat-sub{font-size:11px;color:var(--green-mid)}
  .stat-card.danger .stat-sub{color:var(--danger)}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px}
  .card-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .card-title{font-size:13px;font-weight:600;color:var(--text)}
  .card-section{padding:14px 16px;border-bottom:1px solid var(--border)}
  .section-lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{background:#fafaf8;font-weight:600;color:var(--text2);padding:9px 12px;text-align:left;font-size:11px;white-space:nowrap;border-bottom:1px solid var(--border)}
  td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
  .btn{font-size:12px;padding:6px 14px;border:1px solid var(--border2);border-radius:7px;background:var(--surface);color:var(--text);cursor:pointer;height:32px;white-space:nowrap;font-weight:500;transition:all 0.1s}
  .btn.primary{background:var(--green);color:#fff;border-color:var(--green)}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .form-group{display:flex;flex-direction:column;gap:5px}
  .form-label{font-size:11px;color:var(--text2);font-weight:600}
  .form-input{font-size:12px;padding:8px 10px;border:1px solid var(--border2);border-radius:7px;background:var(--surface);color:var(--text)}
  .sb{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600;display:inline-block;white-space:nowrap}
  .s-active{background:var(--green-light);color:var(--green)}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(2px)}
  .modal{background:var(--surface);border-radius:12px;border:1px solid var(--border);width:400px;max-width:95vw;max-height:90vh;overflow-y:auto}
  #login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:2000}
  .login-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:32px;width:340px}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo" style="width:52px;height:52px;border-radius:12px;background:var(--green);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:700;margin:0 auto 14px;">WS</div>
    <div style="font-size:18px;font-weight:700;color:var(--text);text-align:center;margin-bottom:4px">WELB Solutions</div>
    <div style="font-size:12px;color:var(--text2);text-align:center;margin-bottom:24px">Microfinance Management System</div>
    <div class="login-form">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" id="login-user" value="admin">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="login-pass" value="Welb@2026">
      </div>
      <div id="login-err" style="color:var(--danger);font-size:11px;text-align:center;display:none;margin-top:8px">Invalid credentials</div>
      <button class="btn primary" style="width:100%;height:38px;font-size:13px;margin-top:12px" onclick="doLogin()">Sign In</button>
    </div>
  </div>
</div>

<!-- MAIN APP [Shortened for brevity, use same structure as original] -->
<div id="app" style="display:none">
  <div id="sidebar">
    <div class="brand"><div class="brand-name">WELB Solutions</div></div>
    <div class="nav">
      <div class="nav-item active" onclick="go('dashboard',this)">Dashboard</div>
      <div class="nav-item" onclick="go('clients',this)">Clients</div>
      <div class="nav-item" onclick="go('disbursements',this)">Disbursements</div>
      <div class="nav-item" onclick="go('accounting',this)">Accounting</div>
      <div class="nav-item" onclick="go('shareholders',this)">Founders</div>
      <div class="nav-item" onclick="doLogout()">Logout</div>
    </div>
  </div>
  <div id="main">
    <div class="topbar">
      <div id="page-title">Dashboard</div>
      <div class="save-status"><div class="save-dot" id="save-dot"></div><span id="save-txt">Ready</span></div>
    </div>
    <div class="content">
      <!-- Pages are rendered here as per original index.html -->
      <div class="page active" id="page-dashboard">
        <div class="stats-grid" id="dash-stats"></div>
        <div class="card"><table><tbody id="dash-tbody"></tbody></table></div>
      </div>
      <div class="page" id="page-clients">
          <div class="card"><div class="card-header">All Clients</div><table id="ctbody"></table></div>
      </div>
    </div>
  </div>
</div>

<div id="db-status" style="position:fixed;bottom:14px;right:14px;background:var(--surface);border:1px solid var(--border);padding:8px;font-size:11px;border-radius:8px">
    <div id="db-dot" class="save-dot"></div> <span id="db-txt">Initializing...</span>
</div>

<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCQJSAhF_H7J1rsl6hKMPPgiOA-0QqjaVQ",
  authDomain: "welb-solutions.firebaseapp.com",
  projectId: "welb-solutions",
  storageBucket: "welb-solutions.firebasestorage.app",
  messagingSenderId: "226538094767",
  appId: "1:226538094767:web:6a8e9815c2b69d64fc945a"
};

let S = { clients:[], loans:[], founders:[], contributions:[], payments:[], groups:[], settings:{} };
let db = null;
let dbOk = false;
let currentUser = null;
let CREDENTIALS = { username: 'admin', password: 'Welb@2026' };

// 1. IMPROVED FIREBASE INIT WITH OFFLINE PERSISTENCE
function initFirebase() {
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();

    // Enable Offline Persistence (Crucial for microfinance apps in low-connectivity areas)
    db.enablePersistence().catch(err => {
        console.warn("Persistence failed", err.code);
    });

    // Replace the problematic 'Write Ping' with a simple listener or direct load
    setDbStatus(true);
    dbOk = true; 
    loadAllData();
  } catch(e) { 
    console.error("Firebase init error", e);
    setDbStatus(false); 
  }
}

async function loadAllData() {
  if(!db) return;
  const cols = ['clients','loans','founders','contributions','payments','groups','settings'];
  
  try {
    for(const col of cols) {
      // Use onSnapshot for real-time updates so "reload" isn't even necessary
      db.collection(col).onSnapshot(snap => {
        const data = snap.docs.map(d => ({ ...d.data(), _id: d.id }));
        if (col === 'settings' && data.length > 0) {
            S.settings = data.find(i => i._id === 'main') || {};
            // Sync credentials if custom
            if (S.settings.credentialsCustomized) {
               CREDENTIALS.username = S.settings.username || CREDENTIALS.username;
               CREDENTIALS.password = S.settings.password || CREDENTIALS.password;
            }
        } else {
            S[col] = data;
        }
        refreshUI();
      });
    }
  } catch(e) { console.error('Load error', e); }
}

// 2. ROBUST SAVE DOC
async function saveDoc(col, data) {
  if(!db) {
      console.error("Database not initialized");
      return data;
  }
  setSaveStatus('saving');
  try {
    const cleanData = JSON.parse(JSON.stringify(data)); // Remove undefined fields
    let docRef;
    
    if(cleanData._id) {
      const id = cleanData._id;
      delete cleanData._id;
      await db.collection(col).doc(id).set(cleanData, { merge: true });
    } else {
      docRef = await db.collection(col).add(cleanData);
      data._id = docRef.id;
    }
    
    setSaveStatus('saved');
    setTimeout(() => setSaveStatus('ready'), 2000);
  } catch(e) { 
    console.error('Save error', e); 
    setSaveStatus('ready'); 
    alert("Error saving data. Check connection.");
  }
  return data;
}

// 3. HELPERS & UI
function refreshUI() {
    // Call your render functions based on active page
    const activePg = document.querySelector('.page.active').id.replace('page-', '');
    go(activePg); 
}

function setDbStatus(ok) {
  document.getElementById('db-dot').style.background = ok ? 'var(--green-mid)' : 'var(--danger)';
  document.getElementById('db-txt').textContent = ok ? 'Database Connected & Offline-Ready' : 'Working Offline';
}

function setSaveStatus(state) {
  const dot = document.getElementById('save-dot');
  const txt = document.getElementById('save-txt');
  if(state === 'saving') { dot.style.background='var(--warn)'; txt.textContent='Saving...'; }
  else if(state === 'saved') { dot.style.background='var(--green-mid)'; txt.textContent='Saved'; }
  else { dot.style.background='#ccc'; txt.textContent='Ready'; }
}

function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  if(u === CREDENTIALS.username && p === CREDENTIALS.password) {
    currentUser = u;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    go('dashboard');
  } else {
    document.getElementById('login-err').style.display = 'block';
  }
}

// [Include remaining render and logic functions from your original file]

initFirebase();
</script>
</body>
</html>
